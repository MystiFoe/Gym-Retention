name: gym_retention
description: Gym Retention Management System - Production Ready Mobile App
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  go_router: ^9.0.0
  flutter_riverpod: ^2.4.0
  riverpod_annotation: ^2.1.0
  http: ^1.1.0
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.0.0
  sentry_flutter: ^8.0.0
  razorpay_flutter: ^1.3.6
  share_plus: ^7.2.1
  path_provider: ^2.1.2
  web: ^1.0.0
  intl: ^0.19.0
  fl_chart: ^0.64.0
  file_picker: ^6.1.1
  excel: ^4.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  riverpod_generator: ^2.2.0
  build_runner: ^2.4.6
  custom_lint: ^0.7.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/

