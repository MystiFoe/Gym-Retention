version: '3.8'

services:
  # ============================================================================
  # PostgreSQL Database
  # ============================================================================
  postgres:
    image: postgres:15-alpine
    container_name: gym_retention_db
    restart: always
    environment:
      POSTGRES_DB: gym_retention
      POSTGRES_USER: gym_user
      POSTGRES_PASSWORD: gympass123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./backups:/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gym_user -d gym_retention"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - gym_network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ============================================================================
  # Redis Cache
  # ============================================================================
  redis:
    image: redis:7-alpine
    container_name: gym_retention_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - gym_network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ============================================================================
  # Node.js API Server
  # ============================================================================
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gym_retention_api
    restart: always
    environment:
      NODE_ENV: development
      PORT: "3000"
      DATABASE_URL: "postgresql://gym_user:gympass123@postgres:5432/gym_retention"
      DATABASE_POOL_SIZE: "20"
      JWT_SECRET: "b70c4ceea374df4fbe11f72d0b37e5427b86f49070a98077ae4502d39c35af69"
      JWT_REFRESH_SECRET: "ffec29396540eb4b60e355e44e99ae507ff0adb3ae0ccf5e1c3cbd70e678ea1a"
      CORS_ORIGIN: "http://localhost:3000"
      LOG_LEVEL: info
      ADMIN_SECRET: "GymAdmin@Secret123456789012345678"
      RAZORPAY_KEY_ID: "rzp_test_dummy123456789"
      RAZORPAY_KEY_SECRET: "dummysecret123456789"
      SMTP_HOST: "smtp.gmail.com"
      SMTP_PORT: "587"
      SMTP_SECURE: "false"
      SMTP_USER: "test@gmail.com"
      SMTP_PASSWORD: "testpassword"
      SMTP_FROM: "noreply@gymretention.com"
      SENTRY_DSN: "disabled"
      REDIS_URL: "redis://redis:6379"
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    volumes:
      - ./backups:/backups
    networks:
      - gym_network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ============================================================================
  # Nginx Reverse Proxy
  # ============================================================================
  nginx:
    image: nginx:latest
    container_name: gym_retention_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./config/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
      - ./frontend/build/web:/usr/share/nginx/html:ro
    depends_on:
      - api
    networks:
      - gym_network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ============================================================================
  # Database Backup Service
  # ============================================================================
  backup:
    image: amazon/aws-cli:latest
    container_name: gym_retention_backup
    restart: always
    environment:
      PGPASSWORD: gympass123
      AWS_ACCESS_KEY_ID: "dummy"
      AWS_SECRET_ACCESS_KEY: "dummy"
      AWS_DEFAULT_REGION: ap-south-1
      BACKUP_S3_BUCKET: "dummy-bucket"
      BACKUP_S3_PREFIX: gym-retention/backups
    depends_on:
      - postgres
    volumes:
      - ./backups:/backups
      - ./scripts/backup.sh:/backup.sh:ro
    entrypoint: |
      sh -c '
        apk add --no-cache postgresql-client gzip 2>/dev/null || true
        chmod +x /backup.sh
        while true; do
          /backup.sh
          sleep 86400
        done
      '
    networks:
      - gym_network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ============================================================================
  # Prometheus Monitoring
  # ============================================================================
  prometheus:
    image: prom/prometheus:latest
    container_name: gym_retention_prometheus
    restart: always
    ports:
      - "9090:9090"
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    depends_on:
      - api
    networks:
      - gym_network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ============================================================================
  # Grafana Dashboards
  # ============================================================================
  grafana:
    image: grafana/grafana:latest
    container_name: gym_retention_grafana
    restart: always
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_INSTALL_PLUGINS: ''
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - gym_network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  backups:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local

networks:
  gym_network:
    driver: bridge